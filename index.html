<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Trial X PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#0a0f1f,#000);
overflow:hidden;
color:white;
}

/* glow */
body::before{
content:"";
position:absolute;
width:450px;
height:450px;
background:radial-gradient(circle,#ff0000,transparent);
top:-120px;
left:-120px;
filter:blur(110px);
opacity:.35;
animation:move 6s infinite alternate;
}

@keyframes move{
to{transform:translate(220px,180px);}
}

/* 🔥 SERVER STATUS */
.status{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
padding:10px 20px;
border-radius:20px;
font-weight:bold;
font-size:13px;
z-index:9999;
animation:pulse 1.5s infinite;
}

.off{
background:rgb(38, 166, 18);
box-shadow:0 0 15px rgb(2, 235, 76);
}

.on{
background:green;
box-shadow:0 0 15px lime;
}

@keyframes pulse{
0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.1);}
100%{transform:translateX(-50%) scale(1);}
}

/* card */
.container{
width:380px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 0 35px rgba(255,0,0,0.25);
text-align:center;
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

h2{
margin-bottom:10px;
}

p{
color:#aaa;
font-size:14px;
margin-bottom:20px;
}

/* tags */
.tag{
display:inline-block;
padding:5px 10px;
border-radius:20px;
font-size:11px;
margin:3px;
}
.green{background:rgba(0,255,150,0.1);color:#00ffa6;}
.blue{background:rgba(0,150,255,0.1);color:#00aaff;}
.gray{background:rgba(255,255,255,0.05);color:#aaa;}

/* input */
input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid rgba(255,0,0,0.4);
background:transparent;
color:white;
margin-bottom:15px;
outline:none;
transition:.3s;
}

input:focus{
border-color:#ff0000;
box-shadow:0 0 12px red;
}

/* button */
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ff3b3b,#ff0000);
color:white;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px red;
}

/* pending */
.pending,.success{
display:none;
margin-top:20px;
padding:25px;
border-radius:15px;
animation:fade .4s ease;
}

.pending{
background:rgba(255,200,0,0.08);
border:1px solid orange;
}

.success{
background:rgba(0,255,150,0.08);
border:1px solid #00ffa6;
}

.circle{
width:100px;
height:100px;
border-radius:50%;
border:4px solid rgba(255,255,255,0.1);
margin:15px auto;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:bold;
}

.uid{
font-size:24px;
margin-top:10px;
}

.counter{
margin-top:10px;
font-size:13px;
color:#00ffaa;
opacity:.8;
}

.msg{
margin-top:10px;
font-size:13px;
color:#ff4d4d;
}
</style>
</head>

<body>

<!-- 🔥 SERVER STATUS BOX (ADDED) -->
<div id="statusBox" class="status off">SERVER ONLINE</div>

<div class="container">

<div id="formBox">
<h2>NHE Free Uid Bypass Trial</h2>
<p>Enter UID to activate premium trial</p>

<span class="tag green">3 day Trial</span>
<span class="tag blue">Ultra Fast</span>
<span class="tag gray">Auto System</span>

<input id="uidInput" placeholder="Enter UID">

<button onclick="claim()">Start Trial</button>

<div id="msg" class="msg"></div>

<div class="counter">
🔥 <span id="liveCount">128</span> users active
</div>
</div>

<div id="pendingBox" class="pending">
⏳ Activating...
<div class="circle" id="timer">10:00</div>
</div>

<div id="successBox" class="success">
✔ Activated
<div class="uid" id="showUID"></div>
<p>Premium Access Granted 🚀</p>
</div>

</div>

<script>

let interval;

/* ================= SERVER CHECK (ADDED) ================= */
function checkServer(){

fetch("http://localhost:3000/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({uid:"test"})
})
.then(res=>res.json())
.then(data=>{

let box=document.getElementById("statusBox");

if(data.status==="sent"){
box.innerText="SERVER ONLINE";
box.className="status on";
box.style.background="green";
box.style.boxShadow="0 0 15px lime";
}else{
box.innerText="SERVER ISSUE";
box.className="status off";
box.style.background="red";
box.style.boxShadow="0 0 15px red";
}

})
.catch(()=>{

let box=document.getElementById("statusBox");
box.innerText="SERVER OFFLINE";
box.className="status off";
box.style.background="red";
box.style.boxShadow="0 0 15px red";

});
}

/* ================= ORIGINAL CODE ================= */
function claim(){

let uid=document.getElementById("uidInput").value.trim();
let msg=document.getElementById("msg");

if(uid===""){
msg.innerText="Enter UID first!";
return;
}

msg.innerText="";

document.getElementById("formBox").style.display="none";
document.getElementById("pendingBox").style.display="block";

/* Telegram send */
fetch("http://localhost:3000/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({uid:uid})
});

/* 10 MIN TIMER */
let data={
uid:uid,
end:Date.now()+600000
};

start(data);
}

function start(data){

clearInterval(interval);

interval=setInterval(()=>{

let diff=data.end-Date.now();

if(diff<=0){
clearInterval(interval);
show(data);
return;
}

let m=Math.floor(diff/60000);
let s=Math.floor((diff%60000)/1000);

document.getElementById("timer").innerText=
m+":"+String(s).padStart(2,"0");

},1000);
}

function show(data){

document.getElementById("pendingBox").style.display="none";
document.getElementById("successBox").style.display="block";

document.getElementById("showUID").innerText=data.uid;

}

</script>

</body>
</html>
